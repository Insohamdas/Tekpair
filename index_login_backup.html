<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Tekpair | Modern Service Platform</title>
    <link rel="icon" type="image/png" href="assets/Tekpair.png">
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <script src="/js/supabase.js"></script>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <script>
        tailwind.config = {
            theme: {
                extend: {
                    fontFamily: { sans: ['Inter', 'system-ui', 'sans-serif'] },
                    colors: { brand: { 600: '#0055FF', 700: '#0044CC', 800: '#003399' } },
                    animation: {
                        'float': 'float 6s ease-in-out infinite',
                        'blob': 'blob 7s infinite',
                    },
                    keyframes: {
                        float: { '0%, 100%': { transform: 'translateY(0)' }, '50%': { transform: 'translateY(-10px)' } },
                        blob: {
                            '0%': { transform: 'translate(0px, 0px) scale(1)' },
                            '33%': { transform: 'translate(30px, -50px) scale(1.1)' },
                            '66%': { transform: 'translate(-20px, 20px) scale(0.9)' },
                            '100%': { transform: 'translate(0px, 0px) scale(1)' }
                        }
                    }
                }
            }
        }
    </script>
    <style>
        body { font-family: 'Inter', sans-serif; background-color: #FAFAFA; text-rendering: optimizeLegibility; -webkit-font-smoothing: antialiased; }
        
        .glass-input {
            background: #FFFFFF;
            border: 1px solid #EAEAEA;
            box-shadow: 0px 1px 2px rgba(0, 0, 0, 0.04);
            transition: all 0.2s ease;
        }
        .glass-input:focus {
            border-color: #0055FF;
            box-shadow: 0 0 0 3px rgba(0, 85, 255, 0.15);
            outline: none;
        }
        .btn-modern {
            background: linear-gradient(180deg, #0055FF 0%, #0044CC 100%);
            box-shadow: 0 1px 2px rgba(0, 0, 0, 0.1), inset 0 1px 0 rgba(255, 255, 255, 0.2);
            border: 1px solid #0044CC;
            transition: all 0.2s cubic-bezier(0.4, 0, 0.2, 1);
        }
        .btn-modern:hover {
            background: linear-gradient(180deg, #1A66FF 0%, #0055FF 100%);
            box-shadow: 0 4px 12px rgba(0, 85, 255, 0.25), inset 0 1px 0 rgba(255, 255, 255, 0.2);
        }
        .glassmorphism-card {
            background: rgba(255, 255, 255, 0.08);
            backdrop-filter: blur(24px);
            -webkit-backdrop-filter: blur(24px);
            border: 1px solid rgba(255, 255, 255, 0.15);
            box-shadow: 0 24px 48px -12px rgba(0, 0, 0, 0.2);
        }
    </style>
</head>
<body class="h-screen flex text-gray-900 selection:bg-brand-600 selection:text-white">

    <div class="w-full lg:w-1/2 h-full flex flex-col justify-center items-center p-6 bg-white shrink-0 relative z-10 box-border border-r border-gray-100 overflow-hidden">
        <div class="w-full max-w-[400px] space-y-8 my-auto py-8">
            <div class="space-y-6">
                <a href="/" class="block">
                    <img src="assets/tekpair.svg" alt="Tekpair Logo" class="h-16 w-auto">
                </a>
                <div class="space-y-2">
                    <h1 class="text-[28px] font-semibold tracking-tight text-gray-900 leading-tight">Welcome to TekPair</h1>
                    <p class="text-[15px] text-gray-500 font-normal">Log in or create an account to get started.</p>
                </div>
            </div>

            <div class="relative flex p-1 bg-gray-100/80 rounded-xl">
                <div id="tab-slider" class="absolute top-1 bottom-1 left-1 w-[calc(50%-4px)] bg-white rounded-lg shadow-[0_1px_3px_rgba(0,0,0,0.1)] border border-gray-200/50 transition-transform duration-300 ease-out z-0"></div>
                <button onclick="showSignIn()" id="btn-tab-signin" class="relative z-10 flex-1 py-1.5 text-[14px] font-medium text-gray-900 transition-colors duration-200">Log In</button>
                <button onclick="showRegister()" id="btn-tab-register" class="relative z-10 flex-1 py-1.5 text-[14px] font-medium text-gray-500 hover:text-gray-900 transition-colors duration-200">Sign Up</button>
            </div>

            <div id="authContainer" class="relative">
                <form id="signInForm" class="space-y-5 animate-in fade-in duration-300">
                    <div class="space-y-4">
                        <div class="space-y-1.5">
                            <label for="signInEmail" class="block text-[13px] font-medium text-gray-700">Email</label>
                            <input type="email" id="signInEmail" required class="glass-input w-full px-4 py-2.5 rounded-lg text-[14px] text-gray-900 placeholder:text-gray-400" placeholder="name@example.com">
                        </div>
                        <div class="space-y-1.5">
                            <div class="flex items-center justify-between">
                                <label for="signInPassword" class="block text-[13px] font-medium text-gray-700">Password</label>
                                <a href="forgot-password.html" class="text-[13px] text-brand-600 hover:text-brand-700 font-medium">Forgot password?</a>
                            </div>
                            <div class="relative">
                                <input type="password" id="signInPassword" required class="glass-input w-full px-4 py-2.5 rounded-lg text-[14px] text-gray-900 placeholder:text-gray-400 pr-12" placeholder="••••••••">
                                <button type="button" class="absolute right-3 top-1/2 -translate-y-1/2 text-gray-400 hover:text-gray-600 focus:outline-none" onclick="togglePassword('signInPassword', this)">
                                    <svg class="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="1.5" d="M15 12a3 3 0 11-6 0 3 3 0 016 0z"/><path stroke-linecap="round" stroke-linejoin="round" stroke-width="1.5" d="M2.458 12C3.732 7.943 7.523 5 12 5c4.478 0 8.268 2.943 9.542 7-1.274 4.057-5.064 7-9.542 7-4.477 0-8.268-2.943-9.542-7z"/></svg>
                                </button>
                            </div>
                        </div>
                    </div>
                    
                    <button type="submit" class="btn-modern w-full text-white font-medium py-2.5 rounded-lg text-[14px]">Log In</button>

                    <div class="relative pt-2 pb-2">
                        <div class="absolute inset-0 flex items-center">
                            <div class="w-full border-t border-gray-100"></div>
                        </div>
                        <div class="relative flex justify-center text-[11px] uppercase font-semibold text-gray-400 tracking-wider">
                            <span class="px-3 bg-white">Or continue with</span>
                        </div>
                    </div>

                    <div class="grid grid-cols-1 gap-3">
                        <button type="button" id="googleLogin" class="flex items-center justify-center gap-2 px-4 py-2 bg-white border border-gray-200 hover:border-gray-300 hover:bg-gray-50 rounded-lg transition-colors shadow-sm">
                            <svg class="w-4 h-4" viewBox="0 0 24 24"><path fill="#4285F4" d="M22.56 12.25c0-.78-.07-1.53-.2-2.25H12v4.26h5.92c-.26 1.37-1.04 2.53-2.21 3.31v2.77h3.57c2.08-1.92 3.28-4.74 3.28-8.09z"/><path fill="#34A853" d="M12 23c2.97 0 5.46-.98 7.28-2.66l-3.57-2.77c-.98.66-2.23 1.06-3.71 1.06-2.86 0-5.29-1.93-6.16-4.53H2.18v2.84C3.99 20.53 7.7 23 12 23z"/><path fill="#FBBC05" d="M5.84 14.09c-.22-.66-.35-1.36-.35-2.09s.13-1.43.35-2.09V7.07H2.18C1.43 8.55 1 10.22 1 12s.43 3.45 1.18 4.93l2.85-2.22.81-.62z"/><path fill="#EA4335" d="M12 5.38c1.62 0 3.06.56 4.21 1.64l3.15-3.15C17.45 2.09 14.97 1 12 1 7.7 1 3.99 3.47 2.18 7.07l3.66 2.84c.87-2.6 3.3-4.53 6.16-4.53z"/></svg>
                            <span class="text-[13px] font-medium text-gray-700">Google</span>
                        </button>
                    </div>
                </form>

                <form id="registerForm" class="space-y-4 hidden animate-in fade-in duration-300">
                    <div class="space-y-2">
                        <label class="block text-[13px] font-medium text-gray-700">Select Account Type</label>
                        <div class="grid grid-cols-2 gap-3">
                            <!-- Customer Role -->
                            <div class="role-card group cursor-pointer border border-gray-200 bg-white rounded-xl p-4 relative flex flex-col items-center justify-center gap-2 transition-all hover:border-brand-300 hover:shadow-sm" data-role="customer" onclick="selectRole('customer')">
                                <div class="w-10 h-10 rounded-full bg-gray-50 group-[.active]:bg-brand-100 flex items-center justify-center text-gray-400 group-[.active]:text-brand-600 transition-colors">
                                    <svg class="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="1.5" d="M16 7a4 4 0 11-8 0 4 4 0 018 0zM12 14a7 7 0 00-7 7h14a7 7 0 00-7-7z"/></svg>
                                </div>
                                <div class="text-center">
                                    <div class="text-[13px] font-semibold text-gray-900 group-[.active]:text-brand-700">Customer</div>
                                    <div class="text-[11px] text-gray-500 mt-0.5 group-[.active]:text-brand-600/80">I want to hire</div>
                                </div>
                                <div class="absolute inset-0 rounded-xl ring-2 ring-transparent group-[.active]:ring-brand-600 pointer-events-none transition-all"></div>
                            </div>

                            <!-- Provider Role -->
                            <div class="role-card group cursor-pointer border border-gray-200 bg-white rounded-xl p-4 relative flex flex-col items-center justify-center gap-2 transition-all hover:border-brand-300 hover:shadow-sm" data-role="provider" onclick="selectRole('provider')">
                                <div class="w-10 h-10 rounded-full bg-gray-50 group-[.active]:bg-brand-100 flex items-center justify-center text-gray-400 group-[.active]:text-brand-600 transition-colors">
                                    <svg class="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="1.5" d="M21 13.255A23.931 23.931 0 0112 15c-3.183 0-6.22-.62-9-1.745M16 6V4a2 2 0 00-2-2h-4a2 2 0 00-2 2v2m4 6h.01M5 20h14a2 2 0 002-2V8a2 2 0 00-2-2H5a2 2 0 00-2 2v10a2 2 0 002 2z"/></svg>
                                </div>
                                <div class="text-center">
                                    <div class="text-[13px] font-semibold text-gray-900 group-[.active]:text-brand-700">Service Pro</div>
                                    <div class="text-[11px] text-gray-500 mt-0.5 group-[.active]:text-brand-600/80">I want to work</div>
                                </div>
                                <div class="absolute inset-0 rounded-xl ring-2 ring-transparent group-[.active]:ring-brand-600 pointer-events-none transition-all"></div>
                            </div>
                        </div>
                        <input type="hidden" id="userRole" value="customer">
                    </div>

                    <div class="space-y-3">
                        <div class="space-y-1">
                            <label for="registerName" class="block text-[13px] font-medium text-gray-700">Full Name</label>
                            <input type="text" id="registerName" required class="glass-input w-full px-4 py-2 rounded-lg text-[14px] text-gray-900 placeholder:text-gray-400" placeholder="Soham Das">
                        </div>
                        <div class="space-y-1">
                            <label for="registerEmail" class="block text-[13px] font-medium text-gray-700">Email</label>
                            <input type="email" id="registerEmail" required class="glass-input w-full px-4 py-2 rounded-lg text-[14px] text-gray-900 placeholder:text-gray-400" placeholder="name@example.com">
                        </div>
                        <div class="space-y-1">
                            <label for="registerPassword" class="block text-[13px] font-medium text-gray-700">Password</label>
                            <div class="relative">
                                <input type="password" id="registerPassword" required class="glass-input w-full px-4 py-2 rounded-lg text-[14px] text-gray-900 placeholder:text-gray-400 pr-12" placeholder="Create a password">
                                <button type="button" class="absolute right-3 top-1/2 -translate-y-1/2 text-gray-400 hover:text-gray-600 focus:outline-none" onclick="togglePassword('registerPassword', this)">
                                    <svg class="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="1.5" d="M15 12a3 3 0 11-6 0 3 3 0 016 0z"/><path stroke-linecap="round" stroke-linejoin="round" stroke-width="1.5" d="M2.458 12C3.732 7.943 7.523 5 12 5c4.478 0 8.268 2.943 9.542 7-1.274 4.057-5.064 7-9.542 7-4.477 0-8.268-2.943-9.542-7z"/></svg>
                                </button>
                            </div>
                        </div>
                    </div>

                    <button type="submit" class="btn-modern w-full text-white font-medium py-2.5 rounded-lg text-[14px]">Create Account</button>
                    
                    <p class="text-[12px] text-gray-500 text-center mt-4">
                        By creating an account, you agree to our <a href="#" class="text-gray-900 underline hover:text-brand-600">Terms of Service</a> & <a href="#" class="text-gray-900 underline hover:text-brand-600">Privacy Policy</a>
                    </p>
                </form>

                <div id="errorMessage" class="hidden mt-4 p-3 bg-red-50/80 border border-red-100 rounded-lg text-[13px] text-red-600 flex items-start gap-2">
                    <svg class="w-4 h-4 mt-0.5 flex-shrink-0" fill="currentColor" viewBox="0 0 20 20"><path fill-rule="evenodd" d="M10 18a8 8 0 100-16 8 8 0 000 16zM8.707 7.293a1 1 0 00-1.414 1.414L8.586 10l-1.293 1.293a1 1 0 101.414 1.414L10 11.414l1.293 1.293a1 1 0 001.414-1.414L11.414 10l1.293-1.293a1 1 0 00-1.414-1.414L10 8.586 8.707 7.293z" clip-rule="evenodd"/></svg>
                    <span id="errorText" class="font-medium"></span>
                </div>

            </div>
        </div>
    </div>

    <!-- Right Panel: Marketing & Glassmorphism -->
    <div class="hidden lg:flex lg:w-1/2 relative bg-[linear-gradient(135deg,#0a0a0a_0%,#12121f_100%)] items-center justify-center overflow-hidden">
        
        <!-- Animated Blobs Background -->
        <div class="absolute inset-0 w-full h-full opacity-40">
            <div class="absolute top-[-10%] right-[-10%] w-[500px] h-[500px] bg-blue-600 rounded-full mix-blend-screen filter blur-[120px] animate-blob space-y-4"></div>
            <div class="absolute bottom-[-10%] left-[-10%] w-[600px] h-[600px] bg-indigo-700 rounded-full mix-blend-screen filter blur-[140px] animate-blob" style="animation-delay: 2s;"></div>
            <div class="absolute top-1/2 left-1/2 -translate-x-1/2 -translate-y-1/2 w-[400px] h-[400px] bg-purple-600 rounded-full mix-blend-screen filter blur-[100px] animate-blob" style="animation-delay: 4s;"></div>
        </div>

        <div class="absolute inset-0 bg-[url('data:image/svg+xml;base64,PHN2ZyB4bWxucz0iaHR0cDovL3d3dy53My5vcmcvMjAwMC9zdmciIHdpZHRoPSI0IiBoZWlnaHQ9IjQiPgo8cmVjdCB3aWR0aD0iNCIgaGVpZ2h0PSI0IiBmaWxsPSIjZmZmIiBmaWxsLW9wYWNpdHk9IjAuMDIiLz4KPC9zdmc+')] opacity-40 [mask-image:linear-gradient(to_bottom,white,transparent)]"></div>

        <div class="relative z-10 w-full max-w-lg px-8 animate-float">
            <div class="glassmorphism-card rounded-2xl p-0 overflow-hidden relative shadow-2xl border border-white/10 group mb-6">
                <!-- Video Only (No Text) -->
                <video autoplay muted loop playsinline class="w-full h-auto block object-cover transform transition-transform duration-700 group-hover:scale-105">
                    <source src="assets/login.mp4" type="video/mp4">
                </video>
            </div>

            <!-- Footer Block -->
            <div class="bg-white rounded-2xl p-5 flex justify-between items-center shadow-[0_20px_50px_rgba(0,0,0,0.5)] text-[11px] font-bold tracking-wider uppercase text-gray-900 mt-6 transform hover:-translate-y-1 transition-transform duration-300">
                <div class="flex items-center gap-2">
                    <span class="text-lg">🛡️</span> 
                    <span class="opacity-80">100% Secure</span>
                </div>
                <div class="w-px h-5 bg-gray-200"></div>
                <div class="flex items-center gap-2">
                    <span class="text-lg">💚</span> 
                    <span class="opacity-80">Made with Love</span>
                </div>
                <div class="w-px h-5 bg-gray-200"></div>
                <div class="flex items-center gap-2">
                    <span class="text-lg">🇮🇳</span> 
                    <span class="opacity-80">Proudly Indian</span>
                </div>
            </div>
        </div>
    </div>

    <script>
        const signInForm = document.getElementById('signInForm');
        const registerForm = document.getElementById('registerForm');
        const errorMessage = document.getElementById('errorMessage');

        // Show/Hide Forms
        window.showRegister = function() {
            signInForm.classList.add('hidden');
            registerForm.classList.remove('hidden');
            
            // Update Toggle UI
            const btnReg = document.getElementById('btn-tab-register');
            const btnSign = document.getElementById('btn-tab-signin');
            const slider = document.getElementById('tab-slider');
            
            if(slider) {
                slider.style.transform = 'translateX(100%)';
                btnReg.classList.replace('text-gray-500', 'text-gray-900');
                btnSign.classList.replace('text-gray-900', 'text-gray-500');
            }
            
            hideError();
        };

        window.showSignIn = function() {
            registerForm.classList.add('hidden');
            signInForm.classList.remove('hidden');
            
            // Update Toggle UI
            const btnReg = document.getElementById('btn-tab-register');
            const btnSign = document.getElementById('btn-tab-signin');
            const slider = document.getElementById('tab-slider');
            
            if(slider) {
                slider.style.transform = 'translateX(0)';
                btnSign.classList.replace('text-gray-500', 'text-gray-900');
                btnReg.classList.replace('text-gray-900', 'text-gray-500');
            }
            
            hideError();
        };

        // Role Selection
        window.selectRole = function(role) {
            document.getElementById('userRole').value = role;
            document.querySelectorAll('.role-card').forEach(card => {
                if (card.dataset.role === role) {
                    card.classList.add('active');
                    
                } else {
                    card.classList.remove('active');
                    
                }
            });
        };

        // Toggle Password Visibility
        window.togglePassword = function(inputId, buttonHtmlElement) {
            const input = document.getElementById(inputId);
            const btn = buttonHtmlElement.closest('button');
            if (input.type === 'password') {
                input.type = 'text';
                btn.innerHTML = `<svg class="w-5 h-5 text-brand-600" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="1.5" d="M13.875 18.825A10.05 10.05 0 0112 19c-4.478 0-8.268-2.943-9.543-7a9.97 9.97 0 011.563-3.029m5.858.908a3 3 0 114.243 4.243M9.878 9.878l4.242 4.242M9.88 9.88l-3.29-3.29m7.532 7.532l3.29 3.29M3 3l3.59 3.59m0 0A9.953 9.953 0 0112 5c4.478 0 8.268 2.943 9.543 7a10.025 10.025 0 01-4.132 5.411m0 0L21 21"/></svg>`;
            } else {
                input.type = 'password';
                btn.innerHTML = `<svg class="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="1.5" d="M15 12a3 3 0 11-6 0 3 3 0 016 0z"/><path stroke-linecap="round" stroke-linejoin="round" stroke-width="1.5" d="M2.458 12C3.732 7.943 7.523 5 12 5c4.478 0 8.268 2.943 9.542 7-1.274 4.057-5.064 7-9.542 7-4.477 0-8.268-2.943-9.542-7z"/></svg>`;
            }
        };

        function showError(message) {
            if(errorMessage) {
                const errSpan = errorMessage.querySelector("span") || errorMessage;
                errSpan.textContent = message;
                errorMessage.classList.remove('hidden');
            }
        }

        function hideError() {
            if(errorMessage) {
                errorMessage.classList.add('hidden');
            }
        }

        // Default: Select customer role
        selectRole('customer');

        // URL Parameter: Check for ?mode=provider
        const urlParams = new URLSearchParams(window.location.search);
        if (urlParams.get('mode') === 'provider') {
            showRegister();
            selectRole('provider');
        }
    </script>

    <script type="module">
        const mySignInForm = document.getElementById('signInForm');
        const myRegisterForm = document.getElementById('registerForm');
        const googleLoginBtn = document.getElementById('googleLogin');

        // Helper to handle role-based redirection
        const redirectUser = async () => {
            const { data: { user } } = await window.supabase.auth.getUser();
            if (user && user.user_metadata) {
                const role = user.user_metadata.role;
                if (role === 'provider') {
                    window.location.href = '/provider/dashboard.html';
                } else if (role === 'admin') {
                    window.location.href = '/admin/dashboard.html';
                } else {
                    window.location.href = '/landing.html'; // Default to home for customer
                }
            } else {
                window.location.href = '/landing.html';
            }
        };

        // OAuth Login
        const handleOAuthLogin = async (provider) => {
            hideError();
            if (!window.supabase) {
                showError("Supabase not initialized correctly.");
                return;
            }
            try {
                const { error } = await window.supabase.auth.signInWithOAuth({
                    provider: provider,
                    options: {
                        redirectTo: window.location.origin + '/index.html' // Return here to handle redirection
                    }
                });
                if (error) throw error;
            } catch (error) {
                showError(error.message);
            }
        };

        // Check if returning from OAuth
        window.addEventListener('load', async () => {
            const urlParams = new URLSearchParams(window.location.search);
            // If explicit mode is set (like registering as provider), don't auto-redirect
            if (urlParams.get('mode')) return;

            const { data: { session } } = await window.supabase.auth.getSession();
            if (session) {
                await redirectUser();
            }
        });

        if (googleLoginBtn) googleLoginBtn.addEventListener('click', () => handleOAuthLogin('google'));
        
        mySignInForm.addEventListener('submit', async (e) => {
            e.preventDefault();
            hideError();

            const email = document.getElementById('signInEmail').value;
            const password = document.getElementById('signInPassword').value;

            try {
                const { data, error } = await window.supabase.auth.signInWithPassword({
                    email,
                    password
                });

                if (error) throw error;

                await redirectUser();
            } catch (error) {
                showError(error.message);
            }
        });

        // Register
        myRegisterForm.addEventListener('submit', async (e) => {
            e.preventDefault();
            hideError();

            const name = document.getElementById('registerName').value;
            const email = document.getElementById('registerEmail').value;
            const password = document.getElementById('registerPassword').value;
            const role = document.getElementById('userRole').value;

            try {
                const { data, error } = await window.supabase.auth.signUp({
                    email,
                    password,
                    options: {
                        data: {
                            full_name: name,
                            role: role
                        }
                    }
                });

                if (error) throw error;

                // After signup, we might need confirmation or can auto-redirect if enabled
                await redirectUser();
            } catch (error) {
                showError(error.message);
            }
        });
    </script>
</body>
</html>
