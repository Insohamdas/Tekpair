<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>My Bookings — Tekpair</title>

  <link rel="icon" type="image/png" href="assets/Tekpair.png">
  <meta name="description" content="Track and manage all your Tekpair service bookings in one place.">
  <meta property="og:title" content="My Bookings — Tekpair">
  <meta property="og:description" content="View and track all your home service bookings on Tekpair.">
  <meta property="og:image" content="/og-image.png">
  <meta property="og:type" content="website" />

  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link rel="stylesheet" href="/css/main.css" />
  <link rel="stylesheet" href="/css/components.css" />

  <style>
    /* ── Filter tabs ──────────────────────────────────── */
    .filter-tabs {
      display: flex;
      gap: var(--spacing-1);
      background: var(--color-surface);
      border: 1px solid var(--color-border);
      border-radius: var(--radius-xl);
      padding: var(--spacing-1);
      width: fit-content;
      flex-wrap: wrap;
    }
    .filter-tab {
      padding: var(--spacing-2) var(--spacing-4);
      border: none;
      background: transparent;
      border-radius: var(--radius-lg);
      font-size: var(--font-size-sm);
      font-weight: var(--font-weight-medium);
      color: var(--color-text-secondary);
      cursor: pointer;
      transition: all var(--transition-fast);
      font-family: var(--font-family);
      display: flex;
      align-items: center;
      gap: var(--spacing-2);
      white-space: nowrap;
    }
    .filter-tab:hover { background: var(--color-bg); color: var(--color-text); }
    .filter-tab.active {
      background: var(--color-primary);
      color: #fff;
      font-weight: var(--font-weight-semibold);
    }
    .tab-count {
      background: rgba(255,255,255,0.25);
      border-radius: var(--radius-full);
      padding: 1px 7px;
      font-size: var(--font-size-xs);
      font-weight: var(--font-weight-bold);
    }
    .filter-tab:not(.active) .tab-count {
      background: var(--color-border);
      color: var(--color-text-secondary);
    }

    /* ── Booking card ─────────────────────────────────── */
    .booking-card {
      background: var(--color-surface);
      border: 1px solid var(--color-border);
      border-radius: var(--radius-xl);
      overflow: hidden;
      transition: box-shadow var(--transition-base), border-color var(--transition-base);
      cursor: pointer;
    }
    .booking-card:hover {
      box-shadow: var(--shadow-lg);
      border-color: var(--color-primary-light);
    }
    .booking-card-header {
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: var(--spacing-5) var(--spacing-5) var(--spacing-4);
      gap: var(--spacing-3);
      flex-wrap: wrap;
    }
    .booking-card-provider {
      display: flex;
      align-items: center;
      gap: var(--spacing-3);
      min-width: 0;
    }
    .booking-card-meta {
      flex: 1;
      min-width: 0;
    }
    .booking-card-name {
      font-size: var(--font-size-base);
      font-weight: var(--font-weight-semibold);
      color: var(--color-text);
      margin-bottom: 2px;
      display: flex;
      align-items: center;
      gap: var(--spacing-2);
      flex-wrap: wrap;
    }
    .booking-card-category {
      font-size: var(--font-size-xs);
      color: var(--color-primary);
      background: var(--color-primary-50);
      padding: 2px 8px;
      border-radius: var(--radius-full);
      font-weight: var(--font-weight-medium);
      display: inline-block;
    }
    .booking-card-right {
      display: flex;
      flex-direction: column;
      align-items: flex-end;
      gap: var(--spacing-2);
      flex-shrink: 0;
    }
    .booking-card-id {
      font-size: var(--font-size-xs);
      color: var(--color-text-muted);
    }

    /* Divider */
    .booking-card-divider { height: 1px; background: var(--color-border); }

    /* Info row */
    .booking-card-info {
      display: flex;
      gap: var(--spacing-6);
      padding: var(--spacing-4) var(--spacing-5);
      flex-wrap: wrap;
    }
    .booking-info-item {
      display: flex;
      flex-direction: column;
      gap: 2px;
    }
    .booking-info-label {
      font-size: var(--font-size-xs);
      color: var(--color-text-muted);
      text-transform: uppercase;
      letter-spacing: 0.05em;
    }
    .booking-info-value {
      font-size: var(--font-size-sm);
      font-weight: var(--font-weight-medium);
      color: var(--color-text);
    }

    /* Timeline */
    .booking-timeline {
      padding: var(--spacing-4) var(--spacing-5);
      border-top: 1px solid var(--color-border);
      border-bottom: 1px solid var(--color-border);
      overflow-x: auto;
    }

    /* Card footer actions */
    .booking-card-footer {
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: var(--spacing-4) var(--spacing-5);
      gap: var(--spacing-3);
      flex-wrap: wrap;
    }
    .booking-card-price {
      font-size: var(--font-size-sm);
      color: var(--color-text-secondary);
    }
    .booking-card-price strong {
      font-size: var(--font-size-base);
      color: var(--color-text);
      font-weight: var(--font-weight-bold);
    }
    .booking-card-actions {
      display: flex;
      gap: var(--spacing-2);
      flex-wrap: wrap;
    }

    /* In-progress indicator */
    .in-progress-indicator {
      display: flex;
      align-items: center;
      gap: var(--spacing-2);
      font-size: var(--font-size-sm);
      color: #7e22ce;
      font-weight: var(--font-weight-medium);
      padding: var(--spacing-2) var(--spacing-4);
      background: #F3E8FF;
      border-radius: var(--radius-md);
    }
    .in-progress-dot {
      width: 8px; height: 8px;
      border-radius: 50%;
      background: #9333EA;
      animation: pulse-dot 1.2s ease-in-out infinite;
    }

    /* Timeline custom styles */
    .bk-timeline {
      display: flex;
      align-items: center;
      gap: 0;
      min-width: 400px;
    }
    .bk-step {
      display: flex;
      flex-direction: column;
      align-items: center;
      flex: 1;
      position: relative;
      gap: var(--spacing-1);
    }
    .bk-step:not(:last-child)::after {
      content: '';
      position: absolute;
      top: 12px;
      left: 50%;
      right: -50%;
      height: 2px;
      background: var(--color-border);
      z-index: 0;
    }
    .bk-step.done:not(:last-child)::after,
    .bk-step.active:not(:last-child)::after { background: var(--color-primary); }

    .bk-dot {
      width: 24px; height: 24px;
      border-radius: 50%;
      border: 2px solid var(--color-border-dark);
      background: var(--color-surface);
      display: flex; align-items: center; justify-content: center;
      font-size: 0.6rem;
      font-weight: var(--font-weight-bold);
      color: var(--color-text-muted);
      position: relative; z-index: 1;
      transition: all var(--transition-base);
      flex-shrink: 0;
    }
    .bk-step.done .bk-dot   { background: var(--color-primary); border-color: var(--color-primary); color: #fff; }
    .bk-step.active .bk-dot { border-color: var(--color-primary); color: var(--color-primary); box-shadow: 0 0 0 3px var(--color-primary-light); }
    .bk-step.cancelled .bk-dot { background: var(--color-danger); border-color: var(--color-danger); color: #fff; }
    .bk-step.rejected .bk-dot  { background: var(--color-danger); border-color: var(--color-danger); color: #fff; }

    .bk-label {
      font-size: 0.65rem;
      color: var(--color-text-muted);
      text-align: center;
      line-height: 1.3;
    }
    .bk-step.done .bk-label,
    .bk-step.active .bk-label { color: var(--color-text); font-weight: var(--font-weight-medium); }

    /* Page header area */
    .page-header-bar {
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: var(--spacing-4);
      flex-wrap: wrap;
      margin-bottom: var(--spacing-6);
      padding-top: var(--spacing-8);
    }
    .page-header-bar h1 {
      font-size: var(--font-size-2xl);
      font-weight: var(--font-weight-bold);
      margin: 0;
    }

    /* Skeleton booking card */
    .booking-skeleton {
      background: var(--color-surface);
      border: 1px solid var(--color-border);
      border-radius: var(--radius-xl);
      padding: var(--spacing-5);
      display: flex;
      flex-direction: column;
      gap: var(--spacing-4);
    }
  </style>
</head>
<body>

<div id="page-loader" class="page-loader"><div class="spinner"></div></div>
<script>window._loaderTimer=setTimeout(function(){var l=document.getElementById('page-loader');if(l){l.classList.add('loaded');setTimeout(function(){if(l.parentNode)l.parentNode.removeChild(l)},600)}},2000)</script>

<!-- ══ NAV ══════════════════════════════════════════════════ -->
<nav class="nav">
  <div class="container nav-inner">
    <a href="/landing.html" class="nav-brand">🔧 Tek<span style="color:var(--color-primary)">pair</span></a>
    <div class="nav-links">
      <a href="/landing.html" class="nav-link">Home</a>
      <a href="/bookings.html" class="nav-link active">My Bookings</a>
      <div data-auth="user" style="display:none;" class="nav-dropdown" id="user-menu">
        <button style="background:none;border:none;cursor:pointer;display:flex;align-items:center;gap:8px;"
          onclick="document.getElementById('user-menu').classList.toggle('open')">
          <img data-user-avatar src="" alt="avatar" class="avatar" style="width:32px;height:32px;border-radius:50%;object-fit:cover;" />
          <span data-user-name class="text-sm font-medium hide-mobile"></span>
          <span style="font-size:0.6rem;color:var(--color-text-muted);">▼</span>
        </button>
        <div class="nav-dropdown-menu">
          <a href="/profile.html" class="nav-dropdown-item">👤 My Profile</a>
          <div class="nav-dropdown-divider"></div>
          <button class="nav-dropdown-item danger" onclick="logout()">🚪 Sign Out</button>
        </div>
      </div>
    </div>
  </div>
</nav>

<!-- ══ MAIN ══════════════════════════════════════════════════ -->
<main>
  <div class="container" style="max-width:860px;">

    <div class="page-header-bar">
      <div>
        <h1>My Bookings</h1>
        <p class="text-secondary text-sm" style="margin-top:var(--spacing-1);" id="bookings-subtitle">Loading your bookings…</p>
      </div>
      <a href="/landing.html" class="btn btn-primary btn-sm">+ New Booking</a>
    </div>

    <!-- Filter tabs -->
    <div class="filter-tabs mb-6" role="tablist" style="margin-bottom:var(--spacing-6);">
      <button class="filter-tab active" data-filter="all"       onclick="setFilter('all')"       role="tab">All <span class="tab-count" id="count-all">0</span></button>
      <button class="filter-tab"        data-filter="active"    onclick="setFilter('active')"    role="tab">Active <span class="tab-count" id="count-active">0</span></button>
      <button class="filter-tab"        data-filter="completed" onclick="setFilter('completed')" role="tab">Completed <span class="tab-count" id="count-completed">0</span></button>
      <button class="filter-tab"        data-filter="cancelled" onclick="setFilter('cancelled')" role="tab">Cancelled <span class="tab-count" id="count-cancelled">0</span></button>
    </div>

    <!-- Bookings list -->
    <div id="bookings-list">
      <!-- Skeletons while loading -->
      <div class="booking-skeleton mb-4" style="margin-bottom:var(--spacing-4);">
        <div style="display:flex;gap:12px;align-items:center;">
          <div class="skeleton" style="width:48px;height:48px;border-radius:50%;flex-shrink:0;"></div>
          <div style="flex:1;"><div class="skeleton skeleton-text" style="width:50%;"></div><div class="skeleton skeleton-text" style="width:30%;"></div></div>
          <div class="skeleton skeleton-btn"></div>
        </div>
        <div class="skeleton skeleton-text"></div>
        <div class="skeleton skeleton-text" style="width:70%;"></div>
      </div>
      <div class="booking-skeleton mb-4" style="margin-bottom:var(--spacing-4);">
        <div style="display:flex;gap:12px;align-items:center;">
          <div class="skeleton" style="width:48px;height:48px;border-radius:50%;flex-shrink:0;"></div>
          <div style="flex:1;"><div class="skeleton skeleton-text" style="width:50%;"></div><div class="skeleton skeleton-text" style="width:30%;"></div></div>
          <div class="skeleton skeleton-btn"></div>
        </div>
        <div class="skeleton skeleton-text"></div>
        <div class="skeleton skeleton-text" style="width:70%;"></div>
      </div>
    </div>

  </div>
</main>

<!-- ══ CANCEL MODAL ══════════════════════════════════════════ -->
<div class="modal" id="cancel-modal">
  <div class="modal-overlay" onclick="closeCancelModal()"></div>
  <div class="modal-content" style="max-width:460px;">
    <div class="modal-header">
      <h3>Cancel Booking</h3>
      <button class="modal-close" onclick="closeCancelModal()">×</button>
    </div>
    <div class="modal-body">
      <div class="alert alert-warning mb-4" style="margin-bottom:var(--spacing-4);">
        <span class="alert-icon">⚠</span>
        <div class="alert-body">Are you sure you want to cancel this booking? This action cannot be undone.</div>
      </div>
      <div class="form-group">
        <label class="form-label" for="cancel-reason">Reason for cancellation <span class="required">*</span></label>
        <textarea
          class="form-textarea"
          id="cancel-reason"
          rows="3"
          placeholder="e.g. Change of plans, found another provider…"
        ></textarea>
        <span class="form-error" id="cancel-reason-error"></span>
      </div>
    </div>
    <div class="modal-footer">
      <button class="btn btn-secondary" onclick="closeCancelModal()">Keep Booking</button>
      <button class="btn btn-danger" id="cancel-confirm-btn" onclick="confirmCancel()">Yes, Cancel It</button>
    </div>
  </div>
</div>

<!-- ══ RESCHEDULE MODAL ═══════════════════════════════════════ -->
<div class="modal" id="reschedule-modal">
  <div class="modal-overlay" onclick="closeRescheduleModal()"></div>
  <div class="modal-content" style="max-width:460px;">
    <div class="modal-header">
      <h3>Request Reschedule</h3>
      <button class="modal-close" onclick="closeRescheduleModal()">×</button>
    </div>
    <div class="modal-body">
      <p class="text-secondary text-sm" style="margin-bottom:var(--spacing-4);">
        Your reschedule request will be sent to the provider for approval.
      </p>
      <div class="form-row">
        <div class="form-group" style="margin-bottom:0;">
          <label class="form-label" for="reschedule-date">New Date <span class="required">*</span></label>
          <input class="form-input" type="date" id="reschedule-date" />
          <span class="form-error" id="reschedule-date-error"></span>
        </div>
        <div class="form-group" style="margin-bottom:0;">
          <label class="form-label">New Time <span class="required">*</span></label>
          <div style="display:flex;flex-wrap:wrap;gap:var(--spacing-1);margin-top:2px;" id="reschedule-time-slots">
            <button type="button" class="time-slot-btn" data-time="09:00">9AM</button>
            <button type="button" class="time-slot-btn" data-time="11:00">11AM</button>
            <button type="button" class="time-slot-btn" data-time="13:00">1PM</button>
            <button type="button" class="time-slot-btn" data-time="15:00">3PM</button>
            <button type="button" class="time-slot-btn" data-time="17:00">5PM</button>
            <button type="button" class="time-slot-btn" data-time="19:00">7PM</button>
          </div>
          <span class="form-error" id="reschedule-time-error"></span>
        </div>
      </div>
    </div>
    <div class="modal-footer">
      <button class="btn btn-secondary" onclick="closeRescheduleModal()">Cancel</button>
      <button class="btn btn-primary" id="reschedule-confirm-btn" onclick="confirmReschedule()">Send Request</button>
    </div>
  </div>
</div>

<!-- ══ REVIEW MODAL ══════════════════════════════════════════ -->
<div class="modal" id="review-modal">
  <div class="modal-overlay" onclick="closeReviewModal()"></div>
  <div class="modal-content" style="max-width:460px;">
    <div class="modal-header">
      <h3>Leave a Review</h3>
      <button class="modal-close" onclick="closeReviewModal()">×</button>
    </div>
    <div class="modal-body">
      <p class="text-secondary text-sm" id="review-provider-label" style="margin-bottom:var(--spacing-4);"></p>
      <div class="form-group">
        <label class="form-label">Rating <span class="required">*</span></label>
        <div class="star-rating-input" id="star-input">
          <input type="radio" name="rating" id="star5" value="5" /><label for="star5" title="5 stars">★</label>
          <input type="radio" name="rating" id="star4" value="4" /><label for="star4" title="4 stars">★</label>
          <input type="radio" name="rating" id="star3" value="3" /><label for="star3" title="3 stars">★</label>
          <input type="radio" name="rating" id="star2" value="2" /><label for="star2" title="2 stars">★</label>
          <input type="radio" name="rating" id="star1" value="1" /><label for="star1" title="1 star">★</label>
        </div>
        <span class="form-error" id="review-rating-error"></span>
      </div>
      <div class="form-group">
        <label class="form-label" for="review-comment">Comment</label>
        <textarea class="form-textarea" id="review-comment" rows="3" placeholder="Share your experience…"></textarea>
      </div>
      <div class="alert alert-danger" id="review-error" style="display:none;">
        <span class="alert-icon">⚠</span>
        <div class="alert-body" id="review-error-msg"></div>
      </div>
    </div>
    <div class="modal-footer">
      <button class="btn btn-secondary" onclick="closeReviewModal()">Not Now</button>
      <button class="btn btn-primary" id="review-submit-btn" onclick="submitReview()">Submit Review</button>
    </div>
  </div>
</div>

<div id="toast-container"></div>

<!-- Scripts -->
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<script src="/js/supabase.js"></script>
<script src="/js/auth.js"></script>
<script src="/js/utils.js"></script>

    border-radius: var(--radius-md);
    background: var(--color-surface);
    font-size: var(--font-size-xs);
    font-weight: var(--font-weight-medium);
    color: var(--color-text-secondary);
    cursor: pointer;
    transition: all var(--transition-fast);
    font-family: var(--font-family);
  }

  .time-slot-btn.selected { background: var(--color-primary); border-color: var(--color-primary); color: #fff; }
</style>

<script src="/js/pages/my-bookings.js"></script>
</body>
</html>
